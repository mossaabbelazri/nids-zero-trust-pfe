apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: bitnami/mlflow:latest
          ports:
            - containerPort: 5000
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: default
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
