apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: bitnami/mlflow:2.14.1
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "50m" # Demande seulement 5% d'un cœur CPU
              memory: "128Mi" # Demande seulement 128 Mo de RAM
            limits:
              cpu: "200m" # Limite max à 20% de CPU
              memory: "256Mi" # Limite max à 256 Mo de RAM
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: default
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
